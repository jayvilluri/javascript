<!DOCTYPE html>
<html>
    <head>
        <script src="Slice.js"></script>
        <link rel="stylesheet" href="Slice.css">
    </head>
    <body>
        <h1 style="text-align: center;background-color: blue;">Push</h1>
        <div class="box">
            <label id="lblName">Enter a name</label>
            <input type="text" id="txtName">
            <button id="btnPush" onclick="onClickPush()" class="one">Push</button><br>
            <p id="pResult"></p>
        </div>
        <h1 style="text-align: center;background-color: darkblue;">Slice</h1>
        <div class="box">
            <label id="lblFirstnum">First Number</label>
            <input type="text" id="txtFirstNum"><br>
            <label id="lblSecondNum">Second Number</label>
            <input type="text" id="txtSecondNum"><br>
            <button id="btnSlice" onclick="onClickSlice()" class="two">Slice</button>
            <p id="pSliceResult"></p>
        </div>
    </body>
</html>
