<!DOCTYPE html>
<html>

<head>
    <script>
        function onclickConversion() {
            debugger;
            var number = Number(document.getElementById("txtNum").value);
            var parseNumber = parseInt(document.getElementById("txtNum").value);
            var floatNumber = parseFloat(document.getElementById("txtNum").value);
            alert(number);
            alert(parseNumber);
            alert(floatNumber);
        }
    </script>
</head>

<body>
    <h1>Conversion</h1>
    <label id="lblNum">Enter number</label>
    <input id="txtNum">
    <button id="btnDecimal" onclick="onclickConversion()">Conversion</button>
</body>

</html>
