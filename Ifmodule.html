<!DOCTYPE html>
<html>
    <head>
        <script>
            function onClickModuleCheck(){
                debugger;
                var number=Number(document.getElementById("txtNum").value);
                if(number%5==0){
                    alert("the number is divisible by 5");
                }
                if(number%5!==0)
                alert("the number is not divisible by 5");
            }
        </script>
    </head>
    <body>
        <label id="lblModuleCheck" >Module</label>
        <input id="txtNum" type="number">
        <button id="btnModuleCheck" onclick="onClickModuleCheck()">Check</button>
    </body>

</html>
