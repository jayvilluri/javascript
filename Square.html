<!DOCTYPE html>
<html>
    <head>
        <script>
            function onClickSquare(){
                var a= document.getElementById("txtNum").value;
                alert(a*a*a);
            }
        </script>
    </head>
    <body>
        <h1>Square</h1>
        <label>Enter no</label>
        <input id="txtNum" type="number">
        <button id="btnSquare" onclick="onClickSquare()">Square</button>
    </body>
</html>
